version: "3.8"
services:
  bambusilver-storefront:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bambusilver-storefront
    ports:
      - "3020:80"
    networks:
      - bfs_default
    restart: unless-stopped
    env_file:
      - .env.production

networks:
  bfs_default:
    external: true
